name: test-project

# ── Инфраструктурные сервисы ────────────────────────────────────────────────

services:
  - name: redis
    image: bitnami/redis:latest
    port: 6379
    proxy: redis-proxy
    cluster:
      replicas: 1
      replication_password: repl_secret

  - name: postgres
    image: bitnami/postgresql:latest
    port: 5432
    proxy: pg-proxy
    cluster:
      replicas: 1
      replication_user: replicator
      replication_password: repl_secret
    env:
      POSTGRESQL_DATABASE: archcraft
      POSTGRESQL_USERNAME: user
      POSTGRESQL_PASSWORD: secret
      POSTGRESQL_MAX_CONNECTIONS: "200"

  - name: kafka
    image: confluentinc/cp-kafka:7.6.0
    port: 9092
    readiness:
      tcp_port: 9092
      timeout: 60s
    env:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

# ── Synthetic-сервисы ────────────────────────────────────────────────────────

  - name: backend
    image: archcraft/synthetic:latest
    port: 8080
    replicas: 3
    proxy: backend-proxy          # → backend-proxy-0, backend-proxy-1, backend-proxy-2
    readiness:
      path: /health
      timeout: 30s
    synthetic:
      adapters:
        - redis-adapter           # → redis-adapter-0, redis-adapter-1, redis-adapter-2
        - pg-adapter              # → pg-adapter-0, pg-adapter-1, pg-adapter-2
        - kafka-adapter           # → kafka-adapter-0, kafka-adapter-1, kafka-adapter-2
      endpoints:
        - alias: process
          pipeline:
            - operation: redis-call
              not_found_rate: 0.5
              fallback:
                - operation: pg-call
            - operation: kafka-push   # публикуем событие после записи
        - alias: consume              # вызывается kafka-консьюмером при получении сообщения
          pipeline:
            - operation: pg-call

  - name: frontend
    image: archcraft/synthetic:latest
    port: 8080
    replicas: 3
    proxy: frontend-proxy         # → frontend-proxy-0, frontend-proxy-1, frontend-proxy-2
    readiness:
      path: /health
      timeout: 30s
    synthetic:
      adapters:
        - http-adapter            # → http-adapter-0, http-adapter-1, http-adapter-2
      endpoints:
        - alias: handle
          pipeline:
            - operation: http-call

# ── Адаптеры ─────────────────────────────────────────────────────────────────

adapters:
  - name: redis-adapter
    image: archcraft/redis-adapter:latest
    port: 8080
    technology: redis
    connects_to: redis
    seed_rows: 10000

  - name: pg-adapter
    image: archcraft/pg-adapter:latest
    port: 8080
    technology: postgres
    connects_to: postgres
    seed_rows: 50000
    env:
      PG_POOL_MIN_SIZE: "10"
      PG_POOL_MAX_SIZE: "20"

  - name: http-adapter
    image: archcraft/http-adapter:latest
    port: 8080
    technology: http
    connects_to: backend

  - name: kafka-adapter
    image: archcraft/kafka-adapter:latest
    port: 8080
    technology: kafka
    connects_to: kafka
    consumer:
      group_id: test-project-consumers
      endpoint: consume
      consumers: 3
      partitions: 10

# ── Связи между сервисами ────────────────────────────────────────────────────

connections:
  - from: frontend
    to: backend
    protocol: http
    port: 8080
    via: http-adapter

  - from: backend
    to: redis
    protocol: tcp
    port: 6379
    via: redis-adapter

  - from: backend
    to: postgres
    protocol: tcp
    port: 5432
    via: pg-adapter

  - from: backend
    to: kafka
    protocol: tcp
    port: 9092
    via: kafka-adapter

# ── Сценарии ─────────────────────────────────────────────────────────────────

scenarios:
  # Прогрев — устанавливает соединения и прогревает кэши перед основными сценариями
  - name: warmup
    startup_timeout: 120s
    timeline:
      - at: 0s
        actions:
          - type: load
            target: frontend
            endpoint: handle
            rps: 500
            duration: 20s

  # Базовая нагрузка — 15000 RPS × 30s
  - name: baseline
    startup_timeout: 20s
    timeline:
      - at: 0s
        actions:
          - type: load
            target: frontend      # DNS RR → frontend-proxy-0, frontend-proxy-1, frontend-proxy-2
            endpoint: handle
            rps: 5000
            duration: 120s

  # Деградация Redis — затрагивает redis-proxy → все реплики backend
  - name: redis-degradation
    startup_timeout: 120s
    timeline:
      - at: 0s
        actions:
          - type: load
            target: frontend
            endpoint: handle
            rps: 25000
      - at: 5s
        actions:
          - type: inject_latency
            duration: 120s
            target:
              from: backend
              to: redis           # redis-proxy — единый для всех реплик backend
            latency: 300ms

  # Частичная деградация — убиваем одну реплику, затем инжектируем задержку в другую
  - name: replica-kill
    startup_timeout: 120s
    timeline:
      - at: 0s
        actions:
          - type: load
            target: frontend
            endpoint: handle
            rps: 25000
      - at: 60s
        actions:
          - type: kill
            target: backend[1]    # останавливаем backend-1; backend-proxy-1 продолжает работать
            duration: 120s         # auto-restore через 15s
      - at: 180s
        actions:
          - type: inject_latency
            duration: 60s
            target:
              from: frontend
              to: backend[2]      # только backend-proxy-2 получает задержку
            latency: 500ms

  # Каскадная деградация — деградируем конкретный backend и смотрим на весь frontend
  - name: cascade-degradation
    startup_timeout: 120s
    timeline:
      - at: 0s
        actions:
          - type: load
            target: frontend
            endpoint: handle
            rps: 25000
      - at: 60s
        actions:
          - type: inject_latency
            duration: 60s
            target:
              from: frontend
              to: backend         # fan-out: backend-proxy-0, backend-proxy-1, backend-proxy-2
            latency: 200ms
      - at: 120s
        actions:
          - type: kill
            target: backend[0]
            duration: 60s

# ── Observability ─────────────────────────────────────────────────────────────

observability:
  prometheus:
    port: 9090
  grafana:
    port: 3000
