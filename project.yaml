name: api-bench

# ── Инфраструктурные сервисы ──────────────────────────────────────────────

services:
  - name: redis
    image: bitnami/redis:latest
    port: 6379
    proxy: redis-proxy
    cluster:
      replicas: 1
      replication_password: repl_secret

# ── Synthetic-сервисы ────────────────────────────────────────────────────

  - name: frontend
    image: archcraft/synthetic:latest
    port: 8080
    replicas: 1
    proxy: frontend-proxy
    readiness:
      path: /health
      timeout: 30s
    synthetic:
      adapters:
        - svc-1-adapter
      endpoints:
        - alias: handle
          pipeline:
            - operation: svc-1-call

  - name: svc-1
    image: archcraft/synthetic:latest
    port: 8080
    replicas: 1
    proxy: svc-1-proxy
    readiness:
      path: /health
      timeout: 30s
    synthetic:
      adapters:
        - svc-2-adapter
      endpoints:
        - alias: process
          pipeline:
            - operation: svc-2-call

  - name: svc-2
    image: archcraft/synthetic:latest
    port: 8080
    replicas: 1
    proxy: svc-2-proxy
    readiness:
      path: /health
      timeout: 30s
    synthetic:
      adapters:
        - redis-adapter
      endpoints:
        - alias: process
          pipeline:
            - operation: redis-call

# ── Адаптеры ─────────────────────────────────────────────────────────────

adapters:
  - name: redis-adapter
    image: archcraft/redis-adapter:latest
    port: 8080
    technology: redis
    connects_to: redis
    seed_rows: 10000

  - name: svc-1-adapter
    image: archcraft/http-adapter:latest
    port: 8080
    technology: http
    connects_to: svc-1

  - name: svc-2-adapter
    image: archcraft/http-adapter:latest
    port: 8080
    technology: http
    connects_to: svc-2

# ── Связи между сервисами ────────────────────────────────────────────────

connections:
  - from: frontend
    to: svc-1
    protocol: http
    port: 8080
    via: svc-1-adapter

  - from: svc-1
    to: svc-2
    protocol: http
    port: 8080
    via: svc-2-adapter

  - from: svc-2
    to: redis
    protocol: tcp
    port: 6379
    via: redis-adapter

# ── Сценарии ─────────────────────────────────────────────────────────────

scenarios:
  # Прогрев — устанавливает соединения и прогревает кэши
  - name: warmup
    startup_timeout: 120s
    timeline:
      - at: 0s
        actions:
          - type: load
            target: frontend
            endpoint: handle
            rps: 500
            duration: 20s

# ── Observability ────────────────────────────────────────────────────────

observability:
  prometheus:
    port: 9090
  grafana:
    port: 3000
