name: test-project

# ── Инфраструктурные сервисы ────────────────────────────────────────────────

services:
  - name: redis
    image: redis:7
    port: 6379
    proxy: redis-proxy

  - name: postgres
    image: postgres:16
    port: 5432
    proxy: pg-proxy
    env:
      POSTGRES_DB: archcraft
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret

# ── Synthetic-сервисы ────────────────────────────────────────────────────────

  - name: backend
    image: archcraft/synthetic:latest
    port: 8080
    replicas: 3
    proxy: backend-proxy          # → backend-proxy-0, backend-proxy-1, backend-proxy-2
    readiness:
      path: /health
      timeout: 30s
    synthetic:
      adapters:
        - redis-adapter           # → redis-adapter-0, redis-adapter-1, redis-adapter-2
        - pg-adapter              # → pg-adapter-0, pg-adapter-1, pg-adapter-2
      endpoints:
        - alias: process
          pipeline:
            - operation: redis-call
              not_found_rate: 0.5
              fallback:
                - operation: pg-call

  - name: frontend
    image: archcraft/synthetic:latest
    port: 8080
    replicas: 3
    proxy: frontend-proxy         # → frontend-proxy-0, frontend-proxy-1, frontend-proxy-2
    readiness:
      path: /health
      timeout: 30s
    synthetic:
      adapters:
        - http-adapter            # → http-adapter-0, http-adapter-1, http-adapter-2
      endpoints:
        - alias: handle
          pipeline:
            - operation: http-call

# ── Адаптеры ─────────────────────────────────────────────────────────────────

adapters:
  - name: redis-adapter
    image: archcraft/redis-adapter:latest
    port: 8080
    technology: redis
    connects_to: redis

  - name: pg-adapter
    image: archcraft/pg-adapter:latest
    port: 8080
    technology: postgres
    connects_to: postgres

  - name: http-adapter
    image: archcraft/http-adapter:latest
    port: 8080
    technology: http
    connects_to: backend

# ── Связи между сервисами ────────────────────────────────────────────────────

connections:
  - from: frontend
    to: backend
    protocol: http
    port: 8080
    via: http-adapter

  - from: backend
    to: redis
    protocol: tcp
    port: 6379
    via: redis-adapter

  - from: backend
    to: postgres
    protocol: tcp
    port: 5432
    via: pg-adapter

# ── Сценарии ─────────────────────────────────────────────────────────────────

scenarios:
  # Базовая нагрузка — RR по всем репликам frontend через frontend-proxy-0/1/2
  - name: baseline
    startup_timeout: 120s
    timeline:
      - at: 0s
        actions:
          - type: load
            target: frontend      # DNS RR → frontend-proxy-0, frontend-proxy-1, frontend-proxy-2
            endpoint: handle
            rps: 30
            duration: 20s

  # Деградация Redis — затрагивает redis-proxy → все реплики backend
  - name: redis-degradation
    startup_timeout: 120s
    timeline:
      - at: 0s
        actions:
          - type: load
            target: frontend
            endpoint: handle
            rps: 30
      - at: 5s
        actions:
          - type: inject_latency
            duration: 10s
            target:
              from: backend
              to: redis           # redis-proxy — единый для всех реплик backend
            latency: 300ms

  # Частичная деградация — убиваем одну реплику, затем инжектируем задержку в другую
  - name: replica-kill
    startup_timeout: 120s
    timeline:
      - at: 0s
        actions:
          - type: load
            target: frontend
            endpoint: handle
            rps: 30
      - at: 5s
        actions:
          - type: kill
            target: backend[1]    # останавливаем backend-1; backend-proxy-1 продолжает работать
            duration: 15s         # auto-restore через 15s
      - at: 10s
        actions:
          - type: inject_latency
            duration: 5s
            target:
              from: frontend
              to: backend[2]      # только backend-proxy-2 получает задержку
            latency: 500ms

  # Каскадная деградация — деградируем конкретный backend и смотрим на весь frontend
  - name: cascade-degradation
    startup_timeout: 120s
    timeline:
      - at: 0s
        actions:
          - type: load
            target: frontend
            endpoint: handle
            rps: 30
      - at: 5s
        actions:
          - type: inject_latency
            duration: 10s
            target:
              from: frontend
              to: backend         # fan-out: backend-proxy-0, backend-proxy-1, backend-proxy-2
            latency: 200ms
      - at: 10s
        actions:
          - type: kill
            target: backend[0]
            duration: 8s

# ── Observability ─────────────────────────────────────────────────────────────

observability:
  prometheus:
    port: 9090
  grafana:
    port: 3000
